name: Debug macOS arm64 Build

on:
  workflow_dispatch:  # Manual trigger

jobs:
  debug-macos:
    runs-on: macos-latest
    env:
      TARGET: aarch64-apple-darwin
      SERVER_DIR: darwin-arm64
      EXECUTABLE_NAME: bsv-language-server

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: ${{ env.TARGET }}

    - name: Build tree-sitter-bsv (if needed)
      run: |
        echo "Checking tree-sitter-bsv..."
        if [ -f "tree-sitter-bsv/src/grammar.json" ]; then
          echo "tree-sitter-bsv grammar exists"
        else
          echo "tree-sitter-bsv not found"
        fi

        if [ -f "bsv-language-server/src/tree_sitter_bsv.c" ]; then
          echo "tree_sitter_bsv.c exists in server source"
          ls -la "bsv-language-server/src/tree_sitter_bsv.c"
        else
          echo "ERROR: tree_sitter_bsv.c not found!"
          exit 1
        fi

    - name: Build Rust server for macOS
      run: |
        cd bsv-language-server
        echo "Adding Rust target: $TARGET"
        rustup target add $TARGET

        echo "Building with cargo..."
        cargo build --release --target $TARGET

        echo "Build completed. Checking output..."
        if [ -f "target/$TARGET/release/$EXECUTABLE_NAME" ]; then
          echo "✓ Success: Executable created"
          ls -la "target/$TARGET/release/$EXECUTABLE_NAME"
          file "target/$TARGET/release/$EXECUTABLE_NAME"
        else
          echo "✗ ERROR: Executable not found"
          echo "Listing target directory:"
          ls -la "target/$TARGET/release/" || echo "Directory doesn't exist"
          exit 1
        fi

    - name: Test executable
      run: |
        cd bsv-language-server
        echo "Testing executable..."
        if [ -f "target/$TARGET/release/$EXECUTABLE_NAME" ]; then
          echo "Running executable with --help..."
          ./target/$TARGET/release/$EXECUTABLE_NAME --help || echo "Executable ran (may have error)"
        fi

    - name: Prepare server directory
      run: |
        cd bsv-language-server
        echo "Creating server directory structure..."
        mkdir -p "server/$SERVER_DIR"

        echo "Copying executable..."
        cp "target/$TARGET/release/$EXECUTABLE_NAME" "server/$SERVER_DIR/"
        chmod +x "server/$SERVER_DIR/$EXECUTABLE_NAME"

        echo "Verifying..."
        ls -la "server/$SERVER_DIR/"
        file "server/$SERVER_DIR/$EXECUTABLE_NAME"