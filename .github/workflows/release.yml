name: Release BSV LSP Extension - Multi-platform

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v0.1.0

jobs:
  build:
    strategy:
      matrix:
        platform:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            server_dir: win32-x64
            executable_name: bsv-language-server.exe
          - target: aarch64-apple-darwin
            os: macos-latest
            server_dir: darwin-arm64
            executable_name: bsv-language-server
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            server_dir: linux-x64
            executable_name: bsv-language-server

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write  # Required to upload artifacts

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history for version info

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'bsv-language-server/package-lock.json'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: ${{ matrix.target }}

    - name: Install dependencies
      run: |
        cd bsv-language-server
        npm install

    - name: Compile TypeScript client
      run: |
        cd bsv-language-server
        npm run compile

    - name: Build Rust server
      run: |
        cd bsv-language-server
        rustup target add ${{ matrix.target }}
        cargo build --release --target ${{ matrix.target }}

        # Verify build result - platform-specific checks
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          # Windows PowerShell check
          if (!(Test-Path "target/${{ matrix.target }}/release/${{ matrix.executable_name }}")) {
            Write-Host "Error: Server executable not found"
            exit 1
          }
          Get-ChildItem "target/${{ matrix.target }}/release/${{ matrix.executable_name }}"
        else
          # Linux/macOS bash check
          if [ ! -f "target/${{ matrix.target }}/release/${{ matrix.executable_name }}" ]; then
            echo "Error: Server executable not found"
            exit 1
          fi
          ls -la "target/${{ matrix.target }}/release/${{ matrix.executable_name }}"
          file "target/${{ matrix.target }}/release/${{ matrix.executable_name }}"
        fi

    - name: Prepare platform-specific server binary
      run: |
        cd bsv-language-server

        # Create platform-specific directory
        mkdir -p "server/${{ matrix.server_dir }}"

        # Copy executable to platform directory
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          # Windows PowerShell
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.executable_name }}" -Destination "server/${{ matrix.server_dir }}/"
          Get-ChildItem "server/${{ matrix.server_dir }}/"
        else
          # Linux/macOS bash
          cp "target/${{ matrix.target }}/release/${{ matrix.executable_name }}" "server/${{ matrix.server_dir }}/"
          chmod +x "server/${{ matrix.server_dir }}/${{ matrix.executable_name }}"
          ls -la "server/${{ matrix.server_dir }}/"
          file "server/${{ matrix.server_dir }}/${{ matrix.executable_name }}"
        fi

    - name: Upload server binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: server-${{ matrix.server_dir }}
        path: bsv-language-server/server/${{ matrix.server_dir }}/
        if-no-files-found: error

  package-and-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write  # Required to create GitHub Releases

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history for version info

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'bsv-language-server/package-lock.json'

    - name: Download server binaries
      uses: actions/download-artifact@v4
      with:
        path: bsv-language-server/
        pattern: server-*
        merge-multiple: true

    - name: Install dependencies
      run: |
        cd bsv-language-server
        npm install

    - name: Install vsce
      run: |
        cd bsv-language-server
        npm install -g @vscode/vsce

    - name: Verify all platform binaries
      run: |
        cd bsv-language-server
        echo "Verifying all platform server binaries exist..."

        # Check each platform directory
        platforms=("win32-x64" "darwin-arm64" "linux-x64")

        for platform in "${platforms[@]}"; do
          if [ -d "server/$platform" ]; then
            echo "✓ Platform $platform directory exists"
            ls -la "server/$platform/"
          else
            echo "✗ ERROR: Platform $platform directory missing!"
            exit 1
          fi
        done

        echo "All platform binaries verified successfully."

    - name: Package VSIX with all platforms
      run: |
        cd bsv-language-server
        # Package extension with bundled server binaries for all platforms
        echo "Packaging VSIX extension..."
        vsce package --no-dependencies

        # List generated VSIX file
        echo "Generated VSIX file:"
        ls -la *.vsix

        # Check what's inside the VSIX
        echo "Checking VSIX contents..."
        if ls *.vsix 1> /dev/null 2>&1; then
          unzip -l *.vsix | grep -E "(server/|extension|package.json)" || echo "No matching files found in VSIX"
        else
          echo "ERROR: No VSIX file generated!"
          ls -la
          exit 1
        fi

    - name: Get version from tag
      id: get_version
      run: |
        # Extract version from tag (remove v prefix)
        version="${GITHUB_REF_NAME#v}"
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "Tag version: $version"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: "BSV Language Server v${{ steps.get_version.outputs.version }}"
        tag_name: ${{ github.ref_name }}
        body: |
          ## BSV Language Server v${{ steps.get_version.outputs.version }}

          ### Features
          - Symbol navigation (go-to-definition, document symbols)
          - Constant expansion with hover documentation
          - Syntax highlighting and error recovery
          - Multi-platform support: Windows x86_64, macOS arm64, Linux x86_64

          ### Installation
          1. Download the `.vsix` file below
          2. Open VS Code
          3. Go to Extensions view (Ctrl+Shift+X/Cmd+Shift+X)
          4. Click "..." menu and select "Install from VSIX..."
          5. Select the downloaded file

          ### Notes
          - This release includes the BSV language server executable for multiple platforms:
            - Windows x86_64 (`win32-x64/bsv-language-server.exe`)
            - macOS arm64 (`darwin-arm64/bsv-language-server`)
            - Linux x86_64 (`linux-x64/bsv-language-server`)
          - The extension will automatically use the appropriate platform-specific binary
          - No additional configuration needed
        draft: false
        prerelease: false
        files: |
          bsv-language-server/*.vsix