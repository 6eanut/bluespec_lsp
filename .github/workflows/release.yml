name: Release BSV LSP Extension

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v0.1.0

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: bsv-language-server-windows-x64.vsix
            executable_name: bsv-language-server.exe
            server_dir: win32-x64
          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: bsv-language-server-macos-arm64.vsix
            executable_name: bsv-language-server
            server_dir: darwin-arm64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write  # Required to create GitHub Releases

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history for version info

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'bsv-language-server/package-lock.json'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: ${{ matrix.target }}

    - name: Install dependencies
      run: |
        cd bsv-language-server
        npm install

    - name: Compile TypeScript client
      run: |
        cd bsv-language-server
        npm run compile

    - name: Build Rust server
      run: |
        cd bsv-language-server
        # Add target if not already installed
        rustup target add ${{ matrix.target }}
        # Build release version
        cargo build --release --target ${{ matrix.target }}
        # Verify build result
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          if (!(Test-Path "target/${{ matrix.target }}/release/${{ matrix.executable_name }}")) {
            Write-Host "Error: Server executable not found"
            exit 1
          }
          Get-ChildItem "target/${{ matrix.target }}/release/${{ matrix.executable_name }}"
        else
          if [ ! -f "target/${{ matrix.target }}/release/${{ matrix.executable_name }}" ]; then
            echo "Error: Server executable not found"
            exit 1
          fi
          ls -la "target/${{ matrix.target }}/release/${{ matrix.executable_name }}"
          # Ensure executable permission on macOS/Linux
          chmod +x "target/${{ matrix.target }}/release/${{ matrix.executable_name }}"
        fi

    - name: Prepare server directory for VSIX
      run: |
        cd bsv-language-server
        # Create platform-specific server directory
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          New-Item -ItemType Directory -Force -Path "server/${{ matrix.server_dir }}"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.executable_name }}" -Destination "server/${{ matrix.server_dir }}/"
          Get-ChildItem "server/${{ matrix.server_dir }}/"
        else
          mkdir -p "server/${{ matrix.server_dir }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.executable_name }}" "server/${{ matrix.server_dir }}/"
          ls -la "server/${{ matrix.server_dir }}/"
          chmod +x "server/${{ matrix.server_dir }}/${{ matrix.executable_name }}"
        fi

    - name: Install vsce
      run: |
        cd bsv-language-server
        npm install -g @vscode/vsce

    - name: Package VSIX
      run: |
        cd bsv-language-server
        # Install all dependencies including devDependencies
        npm install
        # Package extension with bundled server
        vsce package
        # Rename VSIX file to include platform
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          Get-ChildItem *.vsix | Rename-Item -NewName "${{ matrix.artifact_name }}"
          Get-ChildItem *.vsix
        else
          mv *.vsix "${{ matrix.artifact_name }}"
          ls -la *.vsix
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: bsv-language-server/${{ matrix.artifact_name }}
        retention-days: 1

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Get version from tag
      id: get_version
      run: |
        # Extract version from tag (remove v prefix)
        version="${GITHUB_REF#refs/tags/v}"
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "Tag version: $version"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: "BSV Language Server v${{ steps.get_version.outputs.version }}"
        tag_name: ${{ github.ref_name }}
        body: |
          ## BSV Language Server v${{ steps.get_version.outputs.version }}

          ### Supported Platforms
          - **Windows x86_64**: Download `bsv-language-server-windows-x64.vsix`
          - **macOS ARM64 (Apple Silicon)**: Download `bsv-language-server-macos-arm64.vsix`

          ### Features
          - Symbol navigation (go-to-definition, document symbols)
          - Constant expansion with hover documentation
          - Syntax highlighting and error recovery
          - Multi-platform native support

          ### Installation
          1. Download the appropriate `.vsix` file for your platform
          2. Open VS Code
          3. Go to Extensions view (Ctrl+Shift+X / Cmd+Shift+X)
          4. Click "..." menu and select "Install from VSIX..."
          5. Select the downloaded file

          ### Notes
          - Each VSIX contains the language server executable for the specific platform
          - The extension will automatically use the bundled server - no additional configuration needed
        draft: false
        prerelease: false
        files: |
          artifacts/bsv-language-server-windows-x64.vsix
          artifacts/bsv-language-server-macos-arm64.vsix