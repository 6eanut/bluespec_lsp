name: Release VSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: darwin-x64
            rust-target: x86_64-apple-darwin
          - os: macos-latest
            target: darwin-arm64
            rust-target: aarch64-apple-darwin
          - os: windows-latest
            target: win32-x64
            rust-target: x86_64-pc-windows-gnu
          - os: windows-latest
            target: win32-arm64
            rust-target: aarch64-pc-windows-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'linux-arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
        shell: bash

      - name: Install cross-compilation tools (Windows)
        if: matrix.target == 'win32-x64' || matrix.target == 'win32-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64
        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build:server:${{ matrix.target }}
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          CARGO_TARGET_AARCH64_PC_WINDOWS_GNU_LINKER: aarch64-w64-mingw32-gcc

      - name: Copy server binaries
        run: npm run copy:server:${{ matrix.target }}
        shell: bash

      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.target }} --dependencies --allow-missing-repository --skip-license
        shell: bash

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bluespec-lsp-${{ matrix.target }}
          path: '*.vsix'