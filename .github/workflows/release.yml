name: Release BSV LSP Extension

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v0.1.0

jobs:
  # Build the Rust language server for multiple platforms in parallel
  build:
    strategy:
      fail-fast: false  # Don't cancel all if one platform fails
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary_name: bsv-language-server-x86_64-pc-windows-msvc.exe
            rust_target: x86_64-pc-windows-msvc
            exe_suffix: .exe

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary_name: bsv-language-server-x86_64-unknown-linux-gnu
            rust_target: x86_64-unknown-linux-gnu
            exe_suffix:

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'bsv-language-server/package-lock.json'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Install tree-sitter-cli
      run: cargo install tree-sitter-cli

    - name: Prepare tree-sitter grammar directory
      shell: bash
      run: |
        cd tree-sitter-bsv
        mkdir -p src

    - name: Generate tree-sitter parser
      shell: bash
      run: |
        cd tree-sitter-bsv
        tree-sitter generate

    - name: Install client dependencies
      run: |
        cd bsv-language-server
        npm install

    - name: Compile TypeScript client
      run: |
        cd bsv-language-server
        npm run compile

    - name: Build Rust server
      shell: bash
      run: |
        cd bsv-language-server
        rustup target add ${{ matrix.rust_target }}
        cargo build --release --target ${{ matrix.rust_target }}

    - name: Rename binary for packaging
      shell: bash
      run: |
        cd bsv-language-server
        mkdir -p server
        cp "target/${{ matrix.rust_target }}/release/bsv-language-server${{ matrix.exe_suffix }}" "server/${{ matrix.binary_name }}"
        ls -lh server/

    - name: Upload server binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: server-${{ matrix.target }}
        path: bsv-language-server/server/${{ matrix.binary_name }}

  # Package all platform binaries into a single VSIX and create a release
  package-and-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Download all server binaries
      uses: actions/download-artifact@v4
      with:
        pattern: server-*
        path: bsv-language-server/server
        merge-multiple: true

    - name: List server binaries
      run: |
        ls -lh bsv-language-server/server/

    - name: Install client dependencies
      run: |
        cd bsv-language-server
        npm install

    - name: Compile TypeScript client
      run: |
        cd bsv-language-server
        npm run compile

    - name: Install vsce
      run: |
        cd bsv-language-server
        npm install -g @vscode/vsce

    - name: Package VSIX
      run: |
        cd bsv-language-server
        vsce package
        ls -lh *.vsix

    - name: Get version from tag
      id: get_version
      run: |
        version="${GITHUB_REF_NAME#v}"
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "Tag version: $version"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: "BSV Language Server v${{ steps.get_version.outputs.version }}"
        tag_name: ${{ github.ref_name }}
        body: |
          ## BSV Language Server v${{ steps.get_version.outputs.version }}

          ### Features
          - Symbol navigation (go-to-definition, document symbols)
          - Constant expansion with hover documentation
          - Syntax highlighting and error recovery
          - Multi-platform support: Windows x86_64, Linux x86_64

          ### Installation
          1. Download the `.vsix` file below
          2. Open VS Code
          3. Go to Extensions view (Ctrl+Shift+X)
          4. Click "..." menu and select "Install from VSIX..."
          5. Select the downloaded file

          ### Supported Platforms
          - Windows x86_64
          - Linux x86_64
        draft: false
        prerelease: false
        files: |
          bsv-language-server/*.vsix
