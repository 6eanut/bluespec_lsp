name: Release BSV LSP Extension for macOS arm64

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v0.1.0

jobs:
  build-and-release-macos:
    runs-on: macos-latest  # macOS arm64 environment
    permissions:
      contents: write  # Required to create GitHub Releases

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Get full history for version info

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'bsv-language-server/package-lock.json'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-apple-darwin  # macOS arm64 target

    - name: Install dependencies
      run: |
        cd bsv-language-server
        npm install

    - name: Compile TypeScript client
      run: |
        cd bsv-language-server
        npm run compile

    - name: Build Rust server for macOS arm64
      run: |
        cd bsv-language-server
        # Add macOS arm64 target
        rustup target add aarch64-apple-darwin
        # Build release version for macOS arm64
        cargo build --release --target aarch64-apple-darwin
        # Verify build result
        if [ ! -f "target/aarch64-apple-darwin/release/bsv-language-server" ]; then
          echo "Error: Server executable not found"
          exit 1
        fi
        ls -la target/aarch64-apple-darwin/release/bsv-language-server
        # Check the binary architecture
        file target/aarch64-apple-darwin/release/bsv-language-server

    - name: Prepare server directory for VSIX
      run: |
        cd bsv-language-server
        # Create server directory
        mkdir -p server
        # Copy macOS arm64 executable to server directory
        cp target/aarch64-apple-darwin/release/bsv-language-server server/
        # Make executable
        chmod +x server/bsv-language-server
        # Verify copied file
        ls -la server/
        file server/bsv-language-server

    - name: Install vsce
      run: |
        cd bsv-language-server
        npm install -g @vscode/vsce

    - name: Package VSIX for macOS
      run: |
        cd bsv-language-server
        # Install all dependencies including devDependencies
        npm install
        # Package extension with bundled server
        vsce package
        # List generated VSIX file
        ls -la *.vsix

    - name: Get version from tag
      id: get_version
      run: |
        # Extract version from tag (remove v prefix)
        version="${GITHUB_REF_NAME#v}"
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "Tag version: $version"

    - name: Create GitHub Release for macOS
      uses: softprops/action-gh-release@v1
      with:
        name: "BSV Language Server v${{ steps.get_version.outputs.version }} (macOS arm64)"
        tag_name: ${{ github.ref_name }}
        body: |
          ## BSV Language Server v${{ steps.get_version.outputs.version }} - macOS arm64

          ### Features
          - Symbol navigation (go-to-definition, document symbols)
          - Constant expansion with hover documentation
          - Syntax highlighting and error recovery
          - macOS arm64 native support

          ### Installation
          1. Download the `.vsix` file below
          2. Open VS Code
          3. Go to Extensions view (Cmd+Shift+X)
          4. Click "..." menu and select "Install from VSIX..."
          5. Select the downloaded file

          ### Notes
          - This release includes the BSV language server executable for macOS arm64
          - The extension will automatically use the bundled server - no additional configuration needed
        draft: false
        prerelease: false
        files: |
          bsv-language-server/*.vsix