name: Build and Release VSIX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 20.x
  RUST_VERSION: stable

jobs:
  build-vsix:
    name: Build VSIX - ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - os: ubuntu-22.04
            arch: x64
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x64
            rust_target: x86_64-unknown-linux-gnu
          # Linux ARM64
          - os: ubuntu-22.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
          # macOS x64
          - os: macos-14
            arch: x64
            target: x64
            artifact_suffix: darwin-x64
            rust_target: x86_64-apple-darwin
          # macOS ARM64
          - os: macos-14
            arch: arm64
            target: arm64
            artifact_suffix: darwin-arm64
            rust_target: aarch64-apple-darwin
          # Windows x64
          - os: windows-2022
            arch: x64
            target: x64
            artifact_suffix: win32-x64
            rust_target: x86_64-pc-windows-msvc
          # Windows ARM64
          - os: windows-2022
            arch: arm64
            target: arm64
            artifact_suffix: win32-arm64
            rust_target: aarch64-pc-windows-msvc

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'bsv-language-server/package-lock.json'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ env.RUST_VERSION }}
        targets: ${{ matrix.rust_target }}

    - name: Install Rust cross-compilation dependencies (Linux ARM64)
      if: matrix.os == 'ubuntu-22.04' && matrix.arch == 'arm64'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
        sudo update-alternatives --set aarch64-linux-gnu-gcc /usr/bin/aarch64-linux-gnu-gcc-11
        sudo update-alternatives --set aarch64-linux-gnu-g++ /usr/bin/aarch64-linux-gnu-g++-11

    - name: Install tree-sitter CLI (Linux/macOS only)
      if: matrix.os != 'windows-2022'
      run: |
        # Use a specific version that's compatible with Ubuntu 22.04
        npm install -g tree-sitter-cli@0.20.8

    - name: Build tree-sitter-bsv (Linux/macOS only)
      if: matrix.os != 'windows-2022'
      run: |
        cd tree-sitter-bsv
        tree-sitter generate
        make

    - name: Pre-build tree-sitter library for Windows
      if: matrix.os == 'windows-2022'
      run: |
        echo "Note: Windows builds will use pre-compiled or skip tree-sitter library"
        # Windows builds need pre-compiled DLL or skip for now
        mkdir -p tree-sitter-bsv
        echo "Windows tree-sitter library needs to be pre-compiled separately"

    - name: Build Rust language server
      run: |
        cd bsv-language-server
        if [ "${{ matrix.os }}" = "windows-2022" ]; then
          cargo build --release --target ${{ matrix.rust_target }}
        else
          # For cross-compilation
          if [ "${{ matrix.rust_target }}" != "${{ runner.arch }}" ]; then
            rustup target add ${{ matrix.rust_target }}
          fi
          cargo build --release --target ${{ matrix.rust_target }}
        fi

    - name: Install npm dependencies and build TypeScript client
      run: |
        cd bsv-language-server
        # First install dependencies to generate package-lock.json
        npm install
        # Then compile TypeScript
        npm run compile

    - name: Create platform-specific directory structure
      run: |
        mkdir -p bsv-language-server/dist/${{ matrix.artifact_suffix }}

        # Copy tree-sitter library (skip for Windows as it's not built)
        if [ "${{ matrix.os }}" = "macos-14" ]; then
          cp tree-sitter-bsv/libtree-sitter-bsv.dylib bsv-language-server/dist/${{ matrix.artifact_suffix }}/ 2>/dev/null || echo "Warning: tree-sitter library not found"
        elif [ "${{ matrix.os }}" != "windows-2022" ]; then
          cp tree-sitter-bsv/libtree-sitter-bsv.so bsv-language-server/dist/${{ matrix.artifact_suffix }}/ 2>/dev/null || echo "Warning: tree-sitter library not found"
        else
          echo "Skipping tree-sitter library copy for Windows"
        fi

        # Copy Rust binary with appropriate extension
        cd bsv-language-server
        if [ "${{ matrix.os }}" = "windows-2022" ]; then
          cp target/${{ matrix.rust_target }}/release/bsv-language-server.exe dist/${{ matrix.artifact_suffix }}/ || echo "Error: Rust binary not found"
        else
          cp target/${{ matrix.rust_target }}/release/bsv-language-server dist/${{ matrix.artifact_suffix }}/ || echo "Error: Rust binary not found"
        fi

    - name: Package VSIX
      run: |
        cd bsv-language-server

        # Prepare extension for this platform
        node ../../scripts/prepare-extension.js ${{ matrix.artifact_suffix }}

        # Install vsce for packaging
        npm install -g @vscode/vsce

        # Package VSIX with platform suffix
        vsce package --out ../dist/${{ matrix.artifact_suffix }}/bsv-language-server-${{ matrix.artifact_suffix }}.vsix

    - name: Upload VSIX artifact
      uses: actions/upload-artifact@v4
      with:
        name: vsix-${{ matrix.artifact_suffix }}
        path: dist/${{ matrix.artifact_suffix }}/bsv-language-server-${{ matrix.artifact_suffix }}.vsix
        retention-days: 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-vsix]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
    - name: Download all VSIX artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Determine release version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "VERSION=${TAG_NAME}" >> $GITHUB_OUTPUT
        fi

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: BSV Language Server ${{ steps.version.outputs.VERSION }}
        body: |
          # BSV Language Server ${{ steps.version.outputs.VERSION }}

          ## Supported Platforms

          - **Windows x64**: `bsv-language-server-win32-x64.vsix`
          - **Windows ARM64**: `bsv-language-server-win32-arm64.vsix`
          - **Linux x64**: `bsv-language-server-linux-x64.vsix`
          - **Linux ARM64**: `bsv-language-server-linux-arm64.vsix`
          - **macOS x64**: `bsv-language-server-darwin-x64.vsix`
          - **macOS ARM64**: `bsv-language-server-darwin-arm64.vsix`

          ## Installation

          1. Download the appropriate VSIX file for your platform
          2. In VS Code, open Extensions view (Ctrl+Shift+X)
          3. Click the "..." menu and select "Install from VSIX..."
          4. Select the downloaded file

          ## Changes

          *Automated release via GitHub Actions*
        files: |
          artifacts/vsix-win32-x64/bsv-language-server-win32-x64.vsix
          artifacts/vsix-win32-arm64/bsv-language-server-win32-arm64.vsix
          artifacts/vsix-linux-x64/bsv-language-server-linux-x64.vsix
          artifacts/vsix-linux-arm64/bsv-language-server-linux-arm64.vsix
          artifacts/vsix-darwin-x64/bsv-language-server-darwin-x64.vsix
          artifacts/vsix-darwin-arm64/bsv-language-server-darwin-arm64.vsix
        draft: false
        prerelease: false